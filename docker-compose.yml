services:
  postgres:
    image: postgres:16
    container_name: educollab-postgres
    environment:
      POSTGRES_DB: EduCollab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d EduCollab"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: educollab-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: Server=postgres;Port=5432;Database=EduCollab;User Id=postgres;Password=postgres;
      Jwt__Issuer: EduCollab.Api
      Jwt__Audience: EduCollab.Client
      Jwt__SecretKey: replace-this-with-a-long-dev-secret-key
      Jwt__ExpirationMinutes: 60
      Email__Enabled: ${Email__Enabled:-true}
      Email__SmtpHost: ${Email__SmtpHost:-}
      Email__SmtpPort: ${Email__SmtpPort:-587}
      Email__UseSsl: ${Email__UseSsl:-true}
      Email__UserName: ${Email__UserName:-}
      Email__Password: ${Email__Password:-}
      Email__FromAddress: ${Email__FromAddress:-noreply@skyform.space}
      Email__FromDisplayName: ${Email__FromDisplayName:-SkyForm}
      WorkspaceInvitation__FrontendAcceptUrl: ${WorkspaceInvitation__FrontendAcceptUrl:-https://skyform.space/workspace/join}
      EmailConfirmation__FrontendConfirmUrl: ${EmailConfirmation__FrontendConfirmUrl:-https://skyform.space/auth/confirm-email}
    ports:
      - "8080:8080"
    volumes:
      - app-data:/app/App_Data

volumes:
  postgres-data:
  app-data:
